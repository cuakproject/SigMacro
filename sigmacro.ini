[Timing]
; Delay antar aksi (ms)
DelayMin=200
DelayMax=350
ClickPre=10
ClickPost=15
SubmitDelay=300
WinVDelay=500
IncompatWait=2000
TFATimeout=15000

[Bezier]
; Parameter gerak mouse bezier
StepsMin=8
StepsMax=15
SleepMin=1
SleepMax=4
OffsetMin=12
OffsetMax=28

[ImageSearch]
; Toleransi warna image search (dipisah koma, dicoba urutan)
Tolerances=30,50,70,90
FastTolerances=30,50,70

[Retry]
; Maksimal retry loop backup code
BCMaxRetry=20

[Coords]
; Override koordinat dari Constants.ahk kalau layout Roblox berubah
; Hapus titik koma (;) untuk mengaktifkan override
; Contoh:
; bc_code1_x=1677
; bc_code1_y=1008
; login_user_x=1407
; login_user_y=343
